# Production nginx reverse proxy for Streamlit
# Deploy this in front of the Streamlit container for TLS termination,
# rate limiting, and static asset caching.

upstream streamlit_backend {
    server streamlit:8501;
    keepalive 32;
}

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=streamlit_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=streamlit_burst:10m rate=20r/s;

server {
    listen 80;
    server_name _;

    # Redirect all HTTP to HTTPS (uncomment in production with certs)
    # return 301 https://$host$request_uri;

    # ------------------------------------------------------------------
    # Security headers
    # ------------------------------------------------------------------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ------------------------------------------------------------------
    # Streamlit WebSocket support
    # ------------------------------------------------------------------
    location /_stcore/stream {
        proxy_pass http://streamlit_backend/_stcore/stream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ------------------------------------------------------------------
    # Streamlit health check
    # ------------------------------------------------------------------
    location /_stcore/health {
        proxy_pass http://streamlit_backend/_stcore/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # ------------------------------------------------------------------
    # Static assets (cache longer)
    # ------------------------------------------------------------------
    location /static/ {
        proxy_pass http://streamlit_backend/static/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ------------------------------------------------------------------
    # Main application
    # ------------------------------------------------------------------
    location / {
        # Apply rate limiting
        limit_req zone=streamlit_limit burst=10 nodelay;
        limit_req zone=streamlit_burst burst=30 nodelay;

        proxy_pass http://streamlit_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeouts for LLM processing
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }
}
