# ============================================================================
# CryptoTradingAgents - Production Docker Compose Stack
#
# Services:
#   streamlit   - The Streamlit web UI (Python 3.10)
#   nginx       - Reverse proxy with rate limiting & WebSocket support
#   redis       - (Optional) Caching / session store
#
# Quick start:
#   1. Copy .env.example to .env and fill in your API keys
#   2. docker compose up -d
#   3. Open http://localhost:80
#
# For a single-service minimal deployment:
#   docker compose up -d streamlit
#   → app available at http://localhost:8501
# ============================================================================

version: "3.9"

services:
  # -----------------------------------------------------------------------
  # Streamlit Application
  # -----------------------------------------------------------------------
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: cryptotradingagents:latest
    container_name: cta-streamlit
    restart: unless-stopped
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    env_file:
      - .env
    environment:
      # Streamlit server settings
      - STREAMLIT_PORT=${STREAMLIT_PORT:-8501}
      - STREAMLIT_SERVER_HEADLESS=${STREAMLIT_SERVER_HEADLESS:-true}
      - STREAMLIT_SERVER_ENABLE_CORS=${STREAMLIT_SERVER_ENABLE_CORS:-false}
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      # Python
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      # Persist generated reports so they survive container restarts
      - cta_reports:/app/tradingagents/reports
      # Mount config/investment preferences for live editing
      - ./cli/investment_preferences:/app/cli/investment_preferences:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - cta_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Resource limits (tune per your host)
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "2G"
        reservations:
          cpus: "0.5"
          memory: "512M"

  # -----------------------------------------------------------------------
  # Nginx Reverse Proxy (optional — remove if you only need direct access)
  # -----------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: cta-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      # Uncomment for HTTPS
      # - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Uncomment for custom TLS certs
      # - ./certs:/etc/nginx/certs:ro
    depends_on:
      streamlit:
        condition: service_healthy
    networks:
      - cta_net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # -----------------------------------------------------------------------
  # Redis (optional cache / session store)
  # -----------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: cta-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - cta_redis:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - cta_net
    profiles:
      - full
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

# -----------------------------------------------------------------------
# Named volumes
# -----------------------------------------------------------------------
volumes:
  cta_reports:
    driver: local
  cta_redis:
    driver: local

# -----------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------
networks:
  cta_net:
    driver: bridge
